<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Controle do Armário</title>

  <style>
    body{
      font-family:Arial;
      padding:20px;
      text-align:center;
      background:#f2f2f2;
      margin:0;
    }

    .container{
      max-width:700px;
      margin:0 auto;
    }

    input{
      width:90%;
      padding:15px;
      font-size:18px;
      margin:10px;
      box-sizing:border-box;
      border:1px solid #ccc;
      border-radius:8px;
    }

    button{
      width:90%;
      padding:18px;
      font-size:20px;
      margin-top:15px;
      background:#1a73e8;
      color:white;
      border:none;
      border-radius:8px;
      cursor:pointer;
    }

    button:hover{
      background:#1557b0;
    }

    #fotoPadrao,
    #previewFoto{
      width:100%;
      margin-top:20px;
      border-radius:10px;
      box-shadow:0 2px 8px rgba(0,0,0,0.15);
    }

    #previewFoto{
      border:4px solid red;
      display:none;
    }

    #sistema{
      display:none;
    }

    #resultado{
      display:none;
      background:white;
      padding:15px;
      border-radius:10px;
      margin-top:20px;
      text-align:left;
      box-shadow:0 2px 8px rgba(0,0,0,0.1);
    }

    .bloco{
      background:white;
      padding:20px;
      border-radius:12px;
      margin-top:20px;
      box-shadow:0 2px 8px rgba(0,0,0,0.08);
    }

    .titulo{
      margin-top:10px;
      margin-bottom:10px;
    }

    .destaque{
      color:#c62828;
      font-weight:bold;
    }

    .ok{
      color:#2e7d32;
      font-weight:bold;
    }

    .info{
      font-size:16px;
      line-height:1.5;
    }
  </style>
</head>
<body>

  <div class="container">
    <h2>Controle do Armário</h2>

    <div id="login" class="bloco">
      <input id="nome" placeholder="Nome do professor">
      <input id="senha" placeholder="Senha" type="password">
      <button onclick="login()">Entrar</button>
    </div>

    <div id="sistema">
      <div class="bloco">
        <h3 class="titulo">Foto padrão do armário</h3>
        <img id="fotoPadrao" src="armario_padrao.jpg" alt="Foto padrão do armário">
        <p class="info"><b>Alinhe o armário como na foto padrão antes de tirar a foto.</b></p>

        <input
          type="file"
          id="cameraInput"
          accept="image/*"
          capture="environment"
          style="display:none"
          onchange="carregarFoto(event)"
        >

        <button onclick="abrirCamera()">Tirar foto do armário</button>

        <img id="previewFoto" alt="Foto capturada do armário">
      </div>

      <div id="resultado">
        <h3>Resultado da análise</h3>
        <div id="listaFerramentas">A análise será feita após a captura da foto.</div>
        <button onclick="salvarRegistro()">Salvar registro</button>
      </div>
    </div>
  </div>

  <script>
    let imagemCapturada = "";
    let ferramentasFaltando = [];

    function login(){
      const senha = document.getElementById("senha").value;

      if(senha === "12345"){
        document.getElementById("login").style.display = "none";
        document.getElementById("sistema").style.display = "block";
      }else{
        alert("Senha incorreta");
      }
    }

    function abrirCamera(){
      document.getElementById("cameraInput").click();
    }

    function carregarFoto(event){
      const file = event.target.files[0];

      if(!file){
        return;
      }

      const reader = new FileReader();

      reader.onload = function(e){
        imagemCapturada = e.target.result;

        const preview = document.getElementById("previewFoto");
        preview.src = imagemCapturada;
        preview.style.display = "block";

        analisarFerramentas();
      };

      reader.readAsDataURL(file);
    }

    function analisarFerramentas(){
      const lista = document.getElementById("listaFerramentas");

      // SIMULAÇÃO INICIAL
      // Próxima etapa: trocar por análise real com visão computacional.
      const ferramentas = [
        "Ferramentas T",
        "Centros superiores",
        "Chaves fixas",
        "Paquímetro",
        "Centros inferiores",
        "Mandris pretos",
        "Martelo",
        "Lâminas",
        "Bandeja inferior"
      ];

      let faltando = [];

      ferramentas.forEach(f => {
        if(Math.random() < 0.2){
          faltando.push(f);
        }
      });

      ferramentasFaltando = faltando;

      if(ferramentasFaltando.length === 0){
        lista.innerHTML =
          "<span class='ok'>✔ Armário completo</span><br>Nenhuma ferramenta faltando.";
      }else{
        lista.innerHTML =
          "<span class='destaque'>Ferramentas faltando:</span><br><br>• " +
          ferramentasFaltando.join("<br>• ");
      }

      document.getElementById("resultado").style.display = "block";
    }

    function salvarRegistro(){
      const nome = document.getElementById("nome").value.trim();

      if(!nome){
        alert("Digite o nome do professor.");
        return;
      }

      if(!imagemCapturada){
        alert("Tire a foto do armário antes de salvar.");
        return;
      }

      let resumo = "";
      if(ferramentasFaltando.length === 0){
        resumo = "Nenhuma ferramenta faltando";
      }else{
        resumo = "Ferramentas faltando: " + ferramentasFaltando.join(", ");
      }

      alert("Registro pronto para salvar.\n\n" + resumo);
    }
  </script>

</body>
</html>
